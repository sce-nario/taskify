<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Taskify</h1>
            <p>Plan, prioritize, and complete your most important work in a calm, modern workspace.</p>
        </header>

        <form id="task-form" class="task-form">
            <h2>Add New Task</h2>
            <input type="text" id="title" placeholder="Task Title" required>
            <textarea id="description" placeholder="Description"></textarea>
            <div class="form-row">
                <input type="date" id="dueDate">
                <select id="status">
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="form-row">
                <select id="priority">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <input type="text" id="category" placeholder="Category (optional)">
            </div>
            <button type="submit">Add Task</button>
        </form>

        <section class="task-section">
            <div class="section-header">
                <h2>Tasks</h2>
                <span class="task-count" id="task-count"></span>
            </div>
            <div class="task-toolbar">
                <input type="search" id="task-search" placeholder="Search tasks...">
                <select id="filter-status">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <select id="filter-priority">
                    <option value="all">All Priorities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <select id="sort-tasks">
                    <option value="due">Sort by due date</option>
                    <option value="priority">Sort by priority</option>
                    <option value="created">Sort by newest</option>
                </select>
            </div>
            <div class="task-metrics">
                <div class="metric"><strong id="pending-count">0</strong> Pending</div>
                <div class="metric"><strong id="in-progress-count">0</strong> In Progress</div>
                <div class="metric"><strong id="completed-count">0</strong> Completed</div>
                <button id="clear-completed" type="button">Clear Completed</button>
            </div>
            <ul id="task-list" class="task-list"></ul>
        </section>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
